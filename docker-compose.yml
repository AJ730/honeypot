services:
  ollama:
    image: ollama/ollama:latest
    # Loopback-only publish so the host-networked honeypot can reach Ollama at
    # 127.0.0.1:11500 while it stays private (never reachable from outside the VM).
    ports:
      - "127.0.0.1:11500:11500"
    environment:
      - OLLAMA_HOST=0.0.0.0:11500
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11500
    volumes:
      - ollama_models:/root/.ollama
    entrypoint: >
      sh -c "until ollama list >/dev/null 2>&1; do echo 'waiting for ollama...'; sleep 2; done;
             ollama pull qwen2.5:7b &&
             ollama pull qwen2.5:3b"
    restart: "no"

  honeypot:
    build: .
    depends_on:
      - ollama
    # Host networking so the honeypot binds the host stack directly on :11434 and
    # sees the REAL client source IP with no NAT in between (critical: logging the
    # true scanner IP is the point of the experiment). It reaches Ollama via the
    # loopback-published 127.0.0.1:11500.
    network_mode: host
    volumes:
      - ./config.yaml:/app/config.yaml
      - honeypot_data:/app/data
    environment:
      - HONEYPOT_DB=/app/data/store.db
      - HONEYPOT_JSONL=/app/data/events.jsonl
    restart: unless-stopped

  dashboard:
    build: .
    depends_on:
      - ollama
    ports:
      - "127.0.0.1:8080:8080"   # operator reaches via: ssh -L 8080:127.0.0.1:8080 honeypot
    volumes:
      - ./config.yaml:/app/config.yaml
      - honeypot_data:/app/data
    environment:
      - HONEYPOT_CONFIG=/app/config.yaml
      - HONEYPOT_DB=/app/data/store.db
      - DASHBOARD_OLLAMA_URL=http://ollama:11500
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:?set DASHBOARD_PASSWORD}
      - DASHBOARD_SECRET=${DASHBOARD_SECRET:-please-change-me}
    command: ["uvicorn", "honeypot.dashboard.main:app", "--host", "0.0.0.0", "--port", "8080"]
    restart: unless-stopped

volumes:
  ollama_models:
  honeypot_data:
